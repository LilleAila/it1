<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Game</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="favicon.png" />

    <script src="/cardmeister/elements.cardmeister.min.js"></script>
    <script src="script.js" type="module" defer></script>
  </head>
  <body>
    <main class="game-container">
      <h1>Poker Game <span id="game-id"></span></h1>
      <div class="game-buttons">
        <div class="buttons-horizontal">
          <button id="back-button">Go Back</button>
          <button id="leave-game">Leave Game</button>
        </div>
        <form id="join-form">
          <button action="submit">Join Game</button>
          <input type="number" name="stack" required placeholder="Stack" />
        </form>
      </div>

      <br />

      <div class="admin-container">
        <button>Start Round</button>

        <div class="requested-seats">
          <h2>Pending requests</h2>
          <div id="requested-seats"></div>
        </div>

        <form id="game-options">
          <h2>Options</h2>
          <label>
            <span>Max Seats</span>
            <input
              type="number"
              name="tableSize"
              placeholder="Max Seats"
              required
            />
          </label>
          <label>
            <span>Turn Time</span>
            <input
              type="number"
              name="turnTime"
              placeholder="Turn Time"
              required
            />
          </label>
          <label>
            <span>Small Blind</span>
            <input
              type="number"
              name="smallBlind"
              placeholder="Small Blind"
              required
            />
          </label>
          <label>
            <span>Big Blind</span>
            <input
              type="number"
              name="bigBlind"
              placeholder="Big Blind"
              required
            />
          </label>
          <button action="submit">Save</button>
        </form>
      </div>

      <div class="game">
        <h2>Players:</h2>
        <ul id="players"></ul>

        <h2>Community Cards</h2>
        <div class="cards community-cards">
          <playing-card
            class="active best"
            rank="3"
            suit="Diamonds"
          ></playing-card>
          <playing-card
            class="active best"
            rank="Q"
            suit="Hearts"
          ></playing-card>
          <playing-card class="active" rank="2" suit="Spades"></playing-card>
          <playing-card
            class="active best"
            rank="6"
            suit="Clubs"
          ></playing-card>
          <playing-card rank="A" suit="Hearts"></playing-card>
        </div>

        <h2>Hole Cards</h2>
        <div class="cards hole-cards">
          <playing-card
            class="active best"
            rank="7"
            suit="Diamonds"
          ></playing-card>
          <playing-card
            class="active best"
            rank="A"
            suit="Hearts"
          ></playing-card>
        </div>

        <p class="hand-info">High Card (A)</p>
      </div>
    </main>

    <footer>
      <p>
        <small>&copy; Olai 2026.</small>
      </p>
    </footer>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Game</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="favicon.png" />

    <script src="script.js" type="module" defer></script>
  </head>
  <body>
    <main class="game-container">
      <h1>Poker Game <span id="game-id"></span></h1>
      <div class="game-buttons">
        <div class="buttons-horizontal">
          <button id="back-button">Go Back</button>
          <button id="leave-game">Leave Game</button>
        </div>
        <form id="join-form">
          <button action="submit">Join Game</button>
          <input type="number" name="stack" required placeholder="Stack" />
        </form>
      </div>

      <br />

      <div class="admin-container">
        <button>Start Round</button>

        <div class="requested-seats">
          <h2>Pending requests</h2>
          <div id="requested-seats"></div>
        </div>
      </div>

      <div class="game">
        <h2>Players:</h2>
        <ul id="players"></ul>
      </div>
    </main>

    <footer>
      <p>
        <small>&copy; Olai 2026.</small>
      </p>
    </footer>
  </body>
</html>

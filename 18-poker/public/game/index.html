<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Game</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="favicon.png" />

    <script src="/cardmeister/elements.cardmeister.min.js"></script>
    <script src="script.js" type="module" defer></script>
  </head>
  <body>
    <main class="game-container">
      <h1>Poker Game <span id="game-id"></span></h1>
      <h2>Logged in as <span id="username"></span></h2>
      <div class="game-buttons">
        <div class="buttons-horizontal">
          <button id="back-button">Go Back</button>
          <button id="leave-game">Leave Game</button>
          <button id="four-color-toggle">Use Four Colors</button>
        </div>
        <form id="join-form">
          <button action="submit">Join Game</button>
          <input type="number" name="stack" required placeholder="Stack" />
        </form>
      </div>

      <br />

      <div class="loading">
        <h1>Loading game...</h1>
      </div>

      <div class="admin-container">
        <div class="requested-seats">
          <h2>Pending requests</h2>
          <table id="requested-seats">
            <thead>
              <tr>
                <th>Username</th>
                <th>Stack</th>
                <th>Approve</th>
                <th>Decline</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <form id="game-options">
          <h2>Game Options</h2>
          <label>
            <span>Max Seats</span>
            <input
              type="number"
              name="tableSize"
              placeholder="Max Seats"
              min="2"
              max="22"
              required
            />
          </label>
          <label>
            <span>Turn Time</span>
            <input
              type="number"
              name="turnTime"
              placeholder="Turn Time"
              min="0"
              required
            />
          </label>
          <label>
            <span>Small Blind</span>
            <input
              type="number"
              name="smallBlind"
              placeholder="Small Blind"
              min="0"
              required
            />
          </label>
          <label>
            <span>Big Blind</span>
            <input
              type="number"
              name="bigBlind"
              placeholder="Big Blind"
              min="0"
              required
            />
          </label>
          <button action="submit">Save</button>
        </form>

        <br />

        <button id="advance">Advance Game</button>
      </div>

      <div class="game">
        <h2>Players:</h2>
        <table id="players">
          <thead>
            <th>Username</th>
            <th>Stack</th>
          </thead>
          <tbody></tbody>
        </table>

        <h2>Community Cards</h2>
        <div class="cards community-cards">
          <playing-card rank="A" suit="Spades" id="card2"></playing-card>
          <playing-card rank="A" suit="Spades" id="card3"></playing-card>
          <playing-card rank="A" suit="Spades" id="card4"></playing-card>
          <playing-card rank="A" suit="Spades" id="card5"></playing-card>
          <playing-card rank="A" suit="Spades" id="card6"></playing-card>
        </div>

        <div class="hide-spectating">
          <h2>Hole Cards</h2>
          <div class="cards hole-cards">
            <playing-card rank="A" suit="Spades" id="card0"></playing-card>
            <playing-card rank="A" suit="Spades" id="card1"></playing-card>
          </div>

          <p id="hand-info" class="hide">Insert Hand Info</p>

          <h2>Actions</h2>
          <div class="player-actions">
            <button>Check</button>
            <button>Call</button>
            <button>Raise</button>
            <button>Fold</button>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p>
        <small>&copy; Olai 2026.</small>
      </p>
    </footer>
  </body>
</html>
